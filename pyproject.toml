[tool.black]
line-length = 120
target-version = ["py310"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]
ignore = ["B904", "B008"]

[tool.mypy]
python_version = 3.10
strict = false
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_defs = true
