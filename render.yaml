services:
  # Web Service - FastAPI Backend
  - type: web
    name: suoops-backend
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Run database migrations after build, before the new version goes live.
    preDeployCommand: bash release.sh
    startCommand: gunicorn app.api.main:app -k uvicorn.workers.UvicornWorker -w 1 --threads 2 --timeout 60 --bind 0.0.0.0:$PORT
    healthCheckPath: /ready
    envVars:
      # Shared secrets (Brevo, WhatsApp, SES, etc.) live in ONE group linked to
      # both web + worker so they can never drift apart. Create the group in the
      # Render dashboard (Environment Groups > "suoops-shared") before syncing.
      - fromGroup: suoops-shared
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: suoops-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: suoops-redis
          type: redis
          property: connectionString

  # Background Worker - Celery
  # IMPORTANT: keep this at a SINGLE instance. The worker embeds --beat, so
  # running multiple instances risks duplicate scheduled tasks (reminders,
  # summaries) and multiplies cost. Throughput is scaled via --concurrency
  # INSIDE one instance, never by adding instances. (A drifted dashboard
  # scale-up to ~12 instances cost ~$86/mo in Jun 2026 vs ~$7 expected.)
  - type: worker
    name: suoops-worker
    runtime: python
    region: oregon
    plan: starter
    scaling:
      minInstances: 1
      maxInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --beat --loglevel=info --concurrency=4
    envVars:
      # Same shared group as the web service — guarantees both have identical secrets.
      - fromGroup: suoops-shared
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: suoops-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: suoops-redis
          type: redis
          property: connectionString

databases:
  - name: suoops-db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"

# Redis is now a native Render service
